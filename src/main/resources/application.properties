spring.application.name=Ticket-Booking-System

# MySQL datasource (update username/password as needed)
spring.datasource.url=jdbc:mysql://localhost:3306/ticketdb?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=changeit
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Default timezone handling
spring.jackson.time-zone=UTC
